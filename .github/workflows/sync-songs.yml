# Runs the same logic as `npm run sync:songs`, commits src/data/songs.json when it changes,
# and pushes to the default branch (Vercel/GitHub Pages etc. then deploy from that commit).
#
# Setup: Repo → Settings → Secrets and variables → Actions → New repository secret
#   Name: SHEETS_CSV_URL
#   Value: published CSV URL from the sheet (Publish to web → CSV), not the /edit link.
#
# Schedule: default every 15 minutes. Change the cron expression below as needed
#   (e.g. "*/5 * * * *" every 5 min, or "* * * * *" every minute — may be delayed under load).
#
# Vercel-only alternative: set SHEETS_CSV_URL in the Vercel project env instead of this
# workflow; the app will read the sheet at runtime and never commit JSON from the server.

name: Sync songs from Google Sheet

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-songs
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Fetch sheet and update songs.json
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
        run: npm run sync:songs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/songs.json
          if git diff --staged --quiet; then
            echo "No changes to songs.json"
          else
            git commit -m "chore: sync songs from Google Sheet"
            git push
          fi
